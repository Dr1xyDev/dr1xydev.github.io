<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DR1XYDEV // TERMINAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#070a0e;
  --panel:#0f141b;
  --panel2:#141a23;
  --border:#212a35;
  --accent:#4ea1ff;
  --accent-dim:#2c6cc4;
  --accent-glow:rgba(78,161,255,0.25);
  --text:#e9edf2;
  --muted:#71808f;
  --danger:#ff5c6c;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;}
body{
  background-image:
    linear-gradient(rgba(78,161,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(78,161,255,0.03) 1px, transparent 1px);
  background-size: 24px 24px;
  min-height:100vh;overflow-x:hidden;
}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
a{color:inherit;}
::selection{background:var(--accent);color:#000;}

/* ---------- INITIAL LOADING SCREEN ---------- */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .5s ease, visibility .5s ease;
}
#loading.hide{opacity:0;visibility:hidden;}
.boot-logo{font-family:'Space Grotesk';font-size:30px;font-weight:700;color:var(--accent);letter-spacing:.04em;}
.boot-line{font-size:12px;color:var(--muted);min-height:16px;}
.boot-bar-bg{width:220px;height:4px;background:var(--panel2);border:1px solid var(--border);}
.boot-bar-fill{height:100%;width:0%;background:var(--accent);box-shadow:0 0 10px var(--accent-glow);transition:width .25s linear;}
.boot-cursor{display:inline-block;width:7px;height:7px;background:var(--accent);animation:blink 1s infinite;margin-left:4px;}

.app{display:flex;min-height:100vh;opacity:0;transition:opacity .6s ease;}
.app.show{opacity:1;}

/* SIDEBAR */
.sidebar{
  width:64px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:6px;
  position:sticky;top:0;height:100vh;flex-shrink:0;z-index:50;
}
.sb-logo{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);font-weight:700;font-family:'Space Grotesk';
  color:var(--accent);margin-bottom:18px;font-size:13px;animation:pulseGlow 3s ease-in-out infinite;
}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 rgba(78,161,255,0);}50%{box-shadow:0 0 14px var(--accent-glow);}}
.sb-btn{
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:.2s ease;
}
.sb-btn:hover{color:var(--text);background:var(--panel2);transform:translateX(2px);}
.sb-btn.active{color:#05080c;background:var(--accent);}
.sb-spacer{flex:1;}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);
  position:sticky;top:0;background:rgba(7,10,14,0.85);backdrop-filter:blur(6px);z-index:40;
}
.topbar .left{color:var(--accent);}
.topbar .right{display:flex;gap:14px;align-items:center;}
.blink{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}

.view-port{flex:1;position:relative;overflow:hidden;}
.content{padding:32px 22px 60px;max-width:1100px;}
.eyebrow{color:var(--accent);font-size:12px;letter-spacing:.12em;margin-bottom:6px;}
.section-title{font-size:42px;font-weight:700;margin-bottom:18px;line-height:1;}
@media(min-width:640px){.section-title{font-size:56px;}}

/* page-style transitions between separate sections */
.section-page{animation:slideIn .45s cubic-bezier(.22,.68,.32,1);}
@keyframes slideIn{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}

/* section-switch loader */
.section-loader{
  position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  opacity:0;transition:opacity .25s ease;z-index:10;
}
.section-loader.show{opacity:1;}
.section-loader .spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.section-loader .sl-text{font-size:11px;color:var(--muted);letter-spacing:.1em;}
@keyframes spin{to{transform:rotate(360deg);}}

/* in-section reveal (appear/disappear on scroll within a section) */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .6s cubic-bezier(.22,.68,.32,1), transform .6s cubic-bezier(.22,.68,.32,1);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* HERO */
.hero-wrap{min-height:74vh;display:flex;flex-direction:column;justify-content:center;}
.hero-name{font-size:48px;font-weight:700;line-height:1;}
@media(min-width:640px){.hero-name{font-size:84px;}}
.hero-name span{background:linear-gradient(90deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.cursor{display:inline-block;width:10px;height:54px;background:var(--accent);margin-left:8px;vertical-align:middle;animation:blink 1s infinite;box-shadow:0 0 10px var(--accent-glow);}
@media(min-width:640px){.cursor{height:70px;}}
.hero-tagline{color:var(--muted);font-size:15px;margin-top:14px;max-width:560px;}
.hero-cta{
  margin-top:26px;display:inline-flex;align-items:center;gap:10px;border:1px solid var(--accent);color:var(--accent);
  padding:12px 20px;font-family:'JetBrains Mono';font-size:13px;letter-spacing:.05em;cursor:pointer;background:transparent;transition:.2s ease;
}
.hero-cta:hover{background:var(--accent);color:#05080c;box-shadow:0 0 22px var(--accent-glow);transform:translateY(-2px);}
.status-row{display:flex;gap:24px;margin-top:48px;flex-wrap:wrap;font-size:11px;color:var(--muted);}
.status-row b{color:var(--text);}

/* PANEL */
.panel{background:var(--panel);border:1px solid var(--border);padding:24px;margin-bottom:20px;position:relative;transition:border-color .3s ease;}
.panel:hover{border-color:var(--accent-dim);}
.panel-label{font-size:11px;color:var(--accent);letter-spacing:.1em;margin-bottom:10px;}
.bio{color:#c7cdd6;font-size:14px;line-height:1.7;white-space:pre-wrap;}
.tag-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.tag{border:1px solid var(--border);padding:6px 12px;font-size:11px;color:var(--muted);transition:.2s;}
.tag:hover{border-color:var(--accent);color:var(--accent);}

/* SKILLS */
.skill-group{margin-bottom:22px;}
.skill-group-label{font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:10px;}
.skill-row{margin-bottom:14px;}
.skill-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.skill-bar-bg{height:6px;background:#161c24;border-radius:3px;overflow:hidden;}
.skill-bar-fill{height:6px;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--accent-dim),var(--accent));box-shadow:0 0 8px var(--accent-glow);transition:width 1.1s cubic-bezier(.16,.84,.44,1);}

/* PROJECTS */
.proj-grid{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:760px){.proj-grid{grid-template-columns:1fr 1fr;}}
.proj-card{background:var(--panel);border:1px solid var(--border);padding:20px;transition:.25s ease;cursor:pointer;}
.proj-card:hover{border-color:var(--accent-dim);transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,0.35);}
.proj-title{font-size:18px;font-weight:700;font-family:'Space Grotesk';margin-bottom:8px;}
.proj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.proj-tag{font-size:10px;color:var(--accent);border:1px solid var(--border);padding:3px 8px;}
.proj-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.proj-open{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--accent);}

/* LINKS */
.links-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:640px){.links-grid{grid-template-columns:1fr 1fr;}}
.link-card{background:var(--panel);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:8px;text-decoration:none;color:inherit;position:relative;transition:.25s ease;}
.link-card:hover{border-color:var(--accent-dim);transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,0.35);}
.link-top{display:flex;justify-content:space-between;align-items:center;}
.link-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--text);}
.link-cat{font-size:10px;color:var(--muted);letter-spacing:.08em;}
.link-label{font-size:17px;font-weight:700;font-family:'Space Grotesk';}

footer.foot{padding:20px 22px;border-top:1px solid var(--border);font-size:10px;color:#3a4250;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}

/* ---------- README MODAL ---------- */
#readme-backdrop{
  position:fixed;inset:0;background:rgba(4,6,9,0);z-index:200;
  display:none;transition:background .3s ease;
}
#readme-backdrop.open{display:block;background:rgba(4,6,9,0.78);}
#readme-modal{
  position:fixed;background:var(--panel);border:1px solid var(--accent-dim);z-index:201;
  overflow:hidden;transition:all .38s cubic-bezier(.22,.68,.32,1);
  display:none;flex-direction:column;
}
#readme-modal.open{
  display:flex;
}
.readme-head{
  display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;
}
.rm-title-wrap{display:flex;gap:14px;align-items:center;min-width:0;}
.rm-icon{
  width:48px;height:48px;flex-shrink:0;border:1px solid var(--accent-dim);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--accent);
  background:var(--panel2);
}
.rm-title-wrap h3{font-size:18px;color:var(--text);}
.rm-stats{display:flex;gap:14px;margin-top:6px;font-size:11.5px;color:var(--muted);align-items:center;}
.rm-stat{display:flex;align-items:center;gap:5px;}
.rm-stat svg{color:var(--accent);}
.rm-stat .spin-sm{width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.readme-close{
  width:30px;height:30px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);
  border-radius:5px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.readme-close:hover{color:var(--text);border-color:var(--accent);}
.readme-body{padding:22px 24px 30px;overflow-y:auto;flex:1;}
.readme-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:30px 0;}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.readme-foot{
  display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);flex-shrink:0;flex-wrap:wrap;gap:10px;
}
.btn-code{
  display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#05080c;font-weight:700;
  padding:8px 14px;border-radius:5px;font-size:12px;text-decoration:none;
}
.btn-code:hover{box-shadow:0 0 14px var(--accent-glow);}

/* github markdown rendering */
.md-body{color:#d4d9e0;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.7;}
.md-body h1,.md-body h2,.md-body h3{font-family:'Space Grotesk';color:var(--text);margin:22px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.md-body h1{font-size:24px;}.md-body h2{font-size:19px;}.md-body h3{font-size:16px;}
.md-body p{margin:10px 0;}
.md-body img{max-width:100%;border-radius:4px;margin:8px 0;}
.md-body a{color:var(--accent);}
.md-body code{background:var(--panel2);padding:2px 6px;border-radius:3px;font-size:12px;}
.md-body pre{background:var(--panel2);padding:14px;overflow-x:auto;border:1px solid var(--border);border-radius:4px;}
.md-body pre code{background:none;padding:0;}
.md-body ul,.md-body ol{padding-left:22px;}
.md-body blockquote{border-left:3px solid var(--accent-dim);margin:10px 0;padding:4px 14px;color:var(--muted);}
.md-body table{border-collapse:collapse;width:100%;margin:12px 0;font-size:12.5px;}
.md-body th,.md-body td{border:1px solid var(--border);padding:6px 10px;}
.readme-fallback{color:var(--muted);font-size:13px;line-height:1.7;}
.readme-fallback a{color:var(--accent);}
</style>
</head>

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
const DATA = loadData();
let activeView = "hero";
let switching = false;

/* ---------------- BOOT / LOADING SCREEN ---------------- */
function boot(){
  const lines=["inicializando terminal","cargando perfil","montando proyectos","conectando enlaces","listo"];
  let i=0;
  const lineEl=document.getElementById('bootLine');
  const barEl=document.getElementById('bootBar');
  const iv=setInterval(()=>{
    i++;
    barEl.style.width=Math.min(100,(i/lines.length)*100)+'%';
    if(i<lines.length){ lineEl.innerHTML=lines[i]+'<span class="boot-cursor"></span>'; }
    else{
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('loading').classList.add('hide');
        renderApp();
        requestAnimationFrame(()=>document.getElementById('app').classList.add('show'));
      },250);
    }
  },260);
}

/* ---------------- RENDER ---------------- */
function renderApp(){
  document.getElementById('app').innerHTML = sidebarHTML() + mainHTML();
  renderView(true);
}

    about:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>',
    projects:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>',
    links:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17H7a5 5 0 0 1 0-10h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>'
  };
  let btns=Object.keys(SECTION_LABELS).map(s=>`
    <button class="sb-btn ${s===activeView?'active':''}" data-nav="${s}" title="${SECTION_LABELS[s]}">${navIcons[s]}</button>
  `).join('');
  return `<div class="sidebar"><div class="sb-logo">D1</div>${btns}<div class="sb-spacer"></div></div>`;
}

function mainHTML(){
  return `<div class="main">
    <div class="topbar">
      <div class="left">:: TERMINAL_DR1XYDEV</div>
      <div class="right"><span class="blink"></span> EN LÍNEA</div>
    </div>
    <div class="view-port" id="viewPort"></div>
    <footer class="foot">
      <span>DR1XYDEV © ${new Date().getFullYear()}</span>
      <span>HECHO EN TERMUX // ANDROID</span>
    </footer>
  </div>`;
}

/* single delegated nav handler — works for sidebar buttons AND any
   in-content button like the hero "Acerca de mí" CTA, regardless of
   when that element was inserted into the DOM */
document.addEventListener('click',(e)=>{
  const el=e.target.closest('[data-nav]');
  if(!el) return;
  const next=el.getAttribute('data-nav');
  if(next===activeView || switching) return;
  activeView=next;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-nav')===activeView));
  renderView(false);
});

function renderView(first){
  const vp=document.getElementById('viewPort');
  if(first){
    vp.innerHTML=`<div class="content section-page" id="sectionPage">${sectionHTML(activeView)}</div>`;
    setupRevealFor(vp); bindProjectClicks();
    return;
  }
  switching=true;
  vp.innerHTML=`<div class="section-loader" id="secLoader"><span class="spin"></span><span class="sl-text">CARGANDO ${SECTION_LABELS[activeView]}...</span></div>`;
  requestAnimationFrame(()=>document.getElementById('secLoader').classList.add('show'));
  setTimeout(()=>{
    vp.innerHTML=`<div class="content section-page" id="sectionPage">${sectionHTML(activeView)}</div>`;
    setupRevealFor(vp); bindProjectClicks();
    switching=false;
  },480);
}

function sectionHTML(view){
  const p=DATA.profile;
  if(view==='hero'){
    return `
    <div class="hero-wrap">
      <div class="eyebrow reveal">// ${p.role}</div>
      <div class="hero-name reveal"><span>${p.name}</span><span class="cursor"></span></div>
      <div class="hero-tagline reveal">${p.tagline}</div>
      <button type="button" class="hero-cta reveal" data-nav="about">&gt;_ ACERCA DE MÍ →</button>
      <div class="status-row">${DATA.status.map(s=>`<div class="reveal">${s.k}: <b>${s.v}</b></div>`).join('')}</div>
    </div>`;
  }
  if(view==='about'){
    return `
    <div class="eyebrow reveal">// ACERCA DE MÍ</div>
    <h1 class="section-title reveal">${p.name}</h1>
    <div class="panel reveal">
      <div class="panel-label">PERFIL</div>
      <div><b>ROL:</b> ${p.role}</div>
      <div style="margin-top:4px;"><b>NIVEL:</b> ${p.level}</div>
      <div class="bio">${p.bio}</div>
      <div class="tag-row">${p.tags.map(t=>`<div class="tag">${t}</div>`).join('')}</div>
    </div>
    <div class="panel-label reveal" style="margin-top:24px;">HABILIDADES</div>
    <div class="panel reveal">
      ${DATA.skills.map(g=>`
        <div class="skill-group">
          <div class="skill-group-label">// ${g.category}</div>
          ${g.items.map(it=>`
            <div class="skill-row">
              <div class="skill-top"><span>${it.name}</span><span>${it.percent}%</span></div>
              <div class="skill-bar-bg"><div class="skill-bar-fill" data-percent="${it.percent}"></div></div>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
  }
  if(view==='projects'){
    return `
    <div class="eyebrow reveal">// PROYECTOS</div>
    <h1 class="section-title reveal">MIS PROYECTOS</h1>
    <div class="proj-grid">
      ${DATA.projects.map((pr,i)=>`
        <div class="proj-card reveal" data-project-idx="${i}">
          <div class="proj-title">${pr.title}</div>
          <div class="proj-tags">${pr.tags.map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div>
          <div class="proj-desc">${pr.description}</div>
          <div class="proj-open">&gt;_ VER README →</div>
        </div>`).join('')}
    </div>`;
  }
  if(view==='links'){
    return `
    <div class="eyebrow reveal">// CONTACTO</div>
    <h1 class="section-title reveal">LINKS</h1>
    <div class="links-grid">
      ${DATA.links.map(l=>`
        <a class="link-card reveal" href="${l.url||'#'}" target="_blank">
          <div class="link-top">
            <div class="link-icon">${ICONS[l.icon]||ICONS.link}</div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
          <div class="link-cat">:: ${l.category}</div>
          <div class="link-label">${l.label}</div>
        </a>`).join('')}
    </div>`;
  }
  return '';
}

/* reveal within current section only */
function setupRevealFor(container){
  const els=container.querySelectorAll('.reveal');
  els.forEach((el,i)=>{ el.style.transitionDelay=(i%6)*60+'ms'; });
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const el=entry.target;
      if(entry.isIntersecting){
        el.classList.add('visible');
        el.querySelectorAll && el.querySelectorAll('.skill-bar-fill').forEach(b=>{ b.style.width=b.getAttribute('data-percent')+'%'; });
        if(el.classList.contains('skill-bar-fill')) el.style.width=el.getAttribute('data-percent')+'%';
      }else{
        el.classList.remove('visible');
        el.querySelectorAll && el.querySelectorAll('.skill-bar-fill').forEach(b=>{ b.style.width='0%'; });
      }
    });
  },{threshold:0.15});
  els.forEach(el=>io.observe(el));
}

/* ---------------- README MODAL ---------------- */
function bindProjectClicks(){
  document.querySelectorAll('[data-project-idx]').forEach(card=>{
    card.addEventListener('click',()=>{
      const idx=parseInt(card.getAttribute('data-project-idx'));
      openReadme(DATA.projects[idx],card);
    });
  });
}

function openReadme(project,cardEl){
  const backdrop=document.getElementById('readme-backdrop');
  const modal=document.getElementById('readme-modal');
  const rect=cardEl.getBoundingClientRect();

  // Asegurar que el modal esté visible antes de posicionarlo
  modal.classList.add('open');
  modal.style.transition='none';
  modal.style.top=rect.top+'px';
  modal.style.left=rect.left+'px';
  modal.style.width=rect.width+'px';
  modal.style.height=rect.height+'px';
  modal.style.borderRadius='6px';

  const initials=(project.title||'?').trim().slice(0,2).toUpperCase();
  modal.innerHTML=`
    <div class="readme-head">
      <div class="rm-title-wrap">
        <div class="rm-icon">${initials}</div>
        <div>
          <h3>${project.title}</h3>
          <div class="rm-stats" id="rmStats">${project.repo?`<span class="spin-sm"></span> cargando stats...`:''}</div>
        </div>
      </div>
      <button class="readme-close" id="readmeClose">×</button>
    </div>
    <div class="readme-body" id="readmeBody">
      <div class="proj-tags">${(project.tags||[]).map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div>
      <div class="panel-label" style="margin-top:14px;">⚡ SOBRE EL PROYECTO</div>
      <div class="bio">${project.description||''}</div>
      <div class="panel-label" style="margin-top:22px;">README</div>
      <div class="readme-loading"><span class="spin"></span> CARGANDO README...</div>
    </div>
    <div class="readme-foot">
      <span>FUENTE: GITHUB ${project.repo?('// '+project.repo):''}</span>
      ${project.repo?`<a class="btn-code" href="https://github.com/${project.repo}" target="_blank">&lt;/&gt; CÓDIGO ↗</a>`:(project.link?`<a class="btn-code" href="${project.link}" target="_blank">VER PROYECTO ↗</a>`:'')}
    </div>`;
  backdrop.classList.add('open');
  void modal.offsetWidth;
  modal.style.transition='all .38s cubic-bezier(.22,.68,.32,1)';

  const isMobile=window.innerWidth<700;
  requestAnimationFrame(()=>{
    if(isMobile){
      modal.style.top='4%'; modal.style.left='3%'; modal.style.width='94%'; modal.style.height='92%';
    }else{
      modal.style.top='6%'; modal.style.left='14%'; modal.style.width='72%'; modal.style.height='88%';
    }
    modal.style.borderRadius='10px';
  });

  document.getElementById('readmeClose').onclick=()=>closeReadme(cardEl);
  backdrop.onclick=()=>closeReadme(cardEl);

  loadReadme(project);
  loadStats(project);
}

function closeReadme(cardEl){
  const backdrop=document.getElementById('readme-backdrop');
  const modal=document.getElementById('readme-modal');
  const rect=cardEl.getBoundingClientRect();
  
  modal.style.transition='all .38s cubic-bezier(.22,.68,.32,1)';
  modal.style.top=rect.top+'px'; 
  modal.style.left=rect.left+'px';
  modal.style.width=rect.width+'px'; 
  modal.style.height=rect.height+'px';
  modal.style.borderRadius='6px';
  
  backdrop.classList.remove('open');
  
  setTimeout(()=>{ 
    modal.classList.remove('open');
    modal.innerHTML=''; 
  },380);
}

async function loadStats(project){
  const el=document.getElementById('rmStats');
  if(!project.repo || !el) return;
  try{
    const res=await fetch(`https://api.github.com/repos/${project.repo}`);
    if(!res.ok) throw new Error('no repo');
    const data=await res.json();
    el.innerHTML=`
      <span class="rm-stat">${ICONS.star} ${data.stargazers_count} EN VIVO</span>
      <span class="rm-stat">${ICONS.fork} ${data.forks_count} FORKS</span>`;
  }catch(e){
    el.innerHTML=`<span class="rm-stat" style="color:var(--muted);">— sin datos del repo —</span>`;
  }
}

async function loadReadme(project){
  const body=document.getElementById('readmeBody');
  const loadingEl=body.querySelector('.readme-loading');
  if(!project.repo){
    loadingEl.outerHTML=`<div class="readme-fallback">No hay repositorio de GitHub vinculado a este proyecto todavía.${project.link?` <a href="${project.link}" target="_blank">Ver enlace →</a>`:''}</div>`;
    return;
  }
  try{
    const res=await fetch(`https://api.github.com/repos/${project.repo}/readme`,{
      headers:{ 'Accept':'application/vnd.github.html+json' }
    });
    if(!res.ok) throw new Error('no readme');
    const html=await res.text();
    loadingEl.outerHTML=`<div class="md-body">${html}</div>`;
  }catch(e){
    loadingEl.outerHTML=`<div class="readme-fallback">No se pudo cargar el README de <b>${project.repo}</b>.<br><br><a href="https://github.com/${project.repo}" target="_blank">Ver repositorio en GitHub →</a></div>`;
  }
}

boot();
</script>
